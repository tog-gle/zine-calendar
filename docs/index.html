<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZINEイベントカレンダー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #fff;
      color: #111;
      font-size: 14px;
      padding: 1.5rem 1rem;
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .meta {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 1.2rem;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      padding: 0.3rem 0.8rem;
      border: 1px solid #111;
      background: transparent;
      font-size: 0.75rem;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.15s;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #111;
      color: #fff;
    }

    .month-section { margin-bottom: 2rem; }

    .month-heading {
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #111;
      padding-bottom: 0.3rem;
      margin-bottom: 0.8rem;
      text-transform: uppercase;
    }

    .event-list { list-style: none; }

    .event-item {
      align-items: start;
      display: grid;
      grid-template-columns: minmax(140px, max-content) 1fr;
      gap: 0.5rem 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #eee;
    }

    .event-date {
      font-size: 0.75rem;
      color: #555;
      padding-top: 0.15rem;
      white-space: nowrap;
      word-break: keep-all;
    }

    .event-title {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #111;
      text-decoration: none;
      line-height: 1.4;
    }

    .event-title:hover { text-decoration: underline; }

    .event-venue {
      display: block;
      font-size: 0.75rem;
      color: #777;
      margin-top: 0.15rem;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      margin-left: 0.3rem;
      vertical-align: middle;
      background: #eee;
      color: #444;
    }

    .badge--tabf         { background: #000; color: #fff; }
    .badge--bunfree      { background: #c44; color: #fff; }
    .badge--mzfest       { background: #336699; color: #fff; }
    .badge--zinefes_note { background: #447744; color: #fff; }
    .badge--artbookosaka { background: #884488; color: #fff; }
    .badge--comitia      { background: #cc6600; color: #fff; }
    .badge--k_comitia    { background: #cc6600; color: #fff; }
    .badge--comiket      { background: #333; color: #fff; }
    .badge--manual       { background: #111; color: #fff; font-weight: bold; }
    .badge--techbookfest { background: #e07020; color: #fff; }

    .filter-btn--diybooks {
      border: 2px solid #111;
      font-weight: bold;
      letter-spacing: 0.08em;
      position: relative;
    }
    .filter-btn--diybooks::before {
      content: "★ ";
      font-size: 0.7rem;
    }
    .filter-btn--diybooks.active,
    .filter-btn--diybooks:hover {
      background: #111;
      color: #fff;
    }

    .empty { color: #999; font-size: 0.85rem; padding: 1rem 0; }

    @media (max-width: 480px) {
      .event-item { grid-template-columns: 1fr; gap: 0.2rem; }
    }
  </style>
</head>
<body>

  <h1>ZINE EVENT CALENDAR</h1>
  <p class="meta" id="updated-at">読み込み中...</p>

  <div class="filters">
    <button class="filter-btn active" data-cat="all">ALL</button>
    <button class="filter-btn" data-cat="アートブックフェア">ART BOOK FAIR</button>
    <button class="filter-btn" data-cat="ZINEフェス">ZINE FEST</button>
    <button class="filter-btn" data-cat="まちのZINEフェス">まちのZINEフェス</button>
    <button class="filter-btn" data-cat="文学フリマ">文学フリマ</button>
    <button class="filter-btn" data-cat="コミティア">コミティア</button>
    <button class="filter-btn" data-cat="コミックマーケット">コミケ</button>
    <button class="filter-btn" data-cat="技術書典">技術書典</button>
    <button class="filter-btn filter-btn--diybooks" data-cat="DIY BOOKS">DIY BOOKS</button>
  </div>

  <div id="calendar"></div>

  <script>
    fetch('./events.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => init(data))
      .catch(() => {
        document.getElementById('calendar').innerHTML =
          '<p class="empty">イベント情報を読み込めませんでした。</p>';
      });

    let allEvents = [];
    let currentCat = 'all';

    // 当月の年月プレフィックス（例: "2026-03"）を返す
    function currentMonthPrefix() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      return y + '-' + m;
    }

    function init(data) {
      const allRaw = data.events || [];

      // 当月以降のみ表示（日付なしは念のため含める）
      const cutoff = currentMonthPrefix();
      allEvents = allRaw.filter(function(e) {
        if (!e.date) return true;
        return e.date.slice(0, 7) >= cutoff;
      });

      const d = new Date(data.updated_at);
      document.getElementById('updated-at').textContent =
        '最終更新: ' + d.toLocaleDateString('ja-JP');

      render();

      document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-btn').forEach(function(b) {
            b.classList.remove('active');
          });
          btn.classList.add('active');
          currentCat = btn.dataset.cat;
          render();
        });
      });
    }

    function render() {
      const cal = document.getElementById('calendar');
      const filtered = currentCat === 'all'
        ? allEvents
        : allEvents.filter(function(e) { return e.category === currentCat; });
      // 日付順に並べ直す（念のため）
      const events = filtered.slice().sort(function(a, b) {
        const da = a.date || '9999-99-99';
        const db = b.date || '9999-99-99';
        return da < db ? -1 : da > db ? 1 : 0;
      });

      if (!events.length) {
        cal.innerHTML = '<p class="empty">該当するイベントがありません。</p>';
        return;
      }

      // 月ごとにグループ化
      const grouped = {};
      events.forEach(function(e) {
        const m = (e.date || '').slice(0, 7) || '未定';
        if (!grouped[m]) grouped[m] = [];
        grouped[m].push(e);
      });

      cal.innerHTML = Object.keys(grouped).sort().map(function(month) {
        const parts = month.split('-');
        const label = month === '未定' ? '未定' : parts[0] + '年' + parseInt(parts[1]) + '月';
        const items = grouped[month].map(function(ev) {
          return '<li class="event-item">' +
            '<span class="event-date">' + (ev.date_display || ev.date || '未定') + '</span>' +
            '<div>' +
              '<a class="event-title" href="' + ev.url + '" target="_blank" rel="noopener">' +
                ev.title +
                '<span class="badge badge--' + ev.source + '">' + ev.category + '</span>' +
              '</a>' +
              '<span class="event-venue">📍 ' + ev.venue + '</span>' +
            '</div>' +
          '</li>';
        }).join('');

        return '<div class="month-section">' +
          '<h2 class="month-heading">' + label + '</h2>' +
          '<ul class="event-list">' + items + '</ul>' +
          '</div>';
      }).join('');
    }
  </script>
</body>
</html>
