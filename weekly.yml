name: ZINE Calendar Sync

on:
  # 毎週月・木 朝9時（JST = UTC+9）に自動実行
  schedule:
    - cron: "0 0 * * 1,4"   # UTC 00:00 = JST 09:00

  # 手動実行も可能（GitHubのActionsタブから "Run workflow" ボタンで起動）
  workflow_dispatch:

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # ② Python セットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ③ 依存ライブラリをインストール
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      # ④ スクレイピング実行 → events.json を生成
      - name: Run scraper
        run: python scraper.py

      # ⑤ events.json の内容をログに表示（デバッグ用）
      - name: Show scraped events
        run: |
          echo "=== Scraped Events ==="
          cat events.json | python -m json.tool | head -80

      # ⑥ Shopify に同期
      - name: Sync to Shopify
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
        run: python sync_to_shopify.py

      # ⑦ events.json をアーティファクトとして保存（30日間保持・確認用）
      - name: Upload events.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ github.run_number }}
          path: events.json
          retention-days: 30
